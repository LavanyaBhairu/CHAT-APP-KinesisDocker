services:
  backend:
    container_name: backend
    build: ./backend
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 5s
      retries: 5
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    environment:
      - PORT=5000

  frontend:
    container_name: frontend
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
